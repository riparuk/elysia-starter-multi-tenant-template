name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: elysia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Typecheck & Build
        run: bun run build
      - name: Push Database Schema
        run: bunx drizzle-kit push --force
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/elysia_test
      - name: Test
        run: bun test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/elysia_test
          BETTER_AUTH_SECRET: test-secret-key-that-is-at-least-32-chars
          BETTER_AUTH_URL: http://localhost:3000
